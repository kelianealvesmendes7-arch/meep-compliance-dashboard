<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meep Compliance Dashboard v2</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .circular-score { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; border: 2px solid; }
        .matrix-cell { height: 42px; border-radius: 4px; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.03); }
        .sidebar-btn.active { background-color: rgba(37, 99, 235, 0.15); color: #60a5fa; border: 1px solid rgba(37, 99, 235, 0.3); font-weight: 700; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function App() {
            const [activeTab, setActiveTab] = useState('monitoramento');
            const [analyzing, setAnalyzing] = useState(false);
            const [dossier, setDossier] = useState(null);
            const fileInputRef = useRef(null);

            const transactions = [
                { id: 'TX-8821', merchant: 'Restaurante Sabor Real', value: 45000, risk: 92, type: 'High Velocity / Fracionamento', status: 'EM ANÁLISE', color: 'text-orange-400 bg-orange-400/10' },
                { id: 'TX-8822', merchant: 'Tech Store LTDA', value: 1250, risk: 12, type: 'Venda Padrão', status: 'APROVADO', color: 'text-emerald-400 bg-emerald-400/10' },
                { id: 'TX-8823', merchant: 'M.J. Comércio Me', value: 150000, risk: 85, type: 'Fora de Perfil (Ticket Médio)', status: 'TRAVA PREVENTIVA', color: 'text-red-400 bg-red-400/10' },
                { id: 'TX-8824', merchant: 'Posto Central', value: 300, risk: 5, type: 'Venda Padrão', status: 'APROVADO', color: 'text-emerald-400 bg-emerald-400/10' },
                { id: 'TX-8825', merchant: 'Joalheria Brilho', value: 25000, risk: 78, type: 'Cartão não Presente / Suspeita de Fraude', status: 'BLOQUEADO', color: 'text-red-500 bg-red-500/10' }
            ];

            const analyzeDossier = (text) => {
                const low = text.toLowerCase();
                setAnalyzing(true);
                setTimeout(() => {
                    let p = 1, i = 1, v = ['sócio', 'mãe', 'pai', 'irmão', 'filho', 'familiar'].find(k => low.includes(k));
                    let checks = [];
                    if (low.includes('pep') || low.includes('político')) { p=3; i=3; checks.push({ title: "PEP", status: "ALERTA", desc: v ? `Vínculo (${v}) é PEP.` : "Titular é PEP.", action: "Coletar DPOP.", basis: "Res. COAF 40/21" }); }
                    if (low.includes('fraude') || low.includes('crime')) { p=5; i=4; checks.push({ title: "JURÍDICO", status: "CRÍTICO", desc: `Crime ligado a ${v||'titular'}.`, action: "Descredenciar.", basis: "Lei 9.613/98" }); }
                    if (checks.length === 0) checks.push({ title: "DILIGÊNCIA", status: "LIMPO", desc: "Nada consta.", action: "Liberar.", basis: "BCB 3.978" });
                    setDossier({ prob: p, imp: i, target: (v || 'titular').toUpperCase(), checks });
                    setAnalyzing(false);
                }, 1500);
            };

            return (
                <div className="flex h-screen text-slate-300">
                    {/* Sidebar */}
                    <div className="w-64 bg-[#0f172a] border-r border-slate-800 flex flex-col shrink-0">
                        <div className="p-6 border-b border-slate-800 mb-4">
                            <div className="flex items-center gap-2">
                                <i className="fa-solid fa-shield-halved text-blue-500 text-2xl"></i>
                                <span className="font-bold text-white text-lg">RiskAnalytics</span>
                            </div>
                            <div className="text-blue-400 text-[10px] font-black uppercase tracking-tighter ml-8">Meep Compliance</div>
                        </div>
                        <nav className="p-4 space-y-2">
                            <button onClick={() => setActiveTab('monitoramento')} className={`w-full sidebar-btn flex items-center gap-3 p-3 rounded-xl transition-all ${activeTab === 'monitoramento' ? 'active' : ''}`}>
                                <i className="fa-solid fa-chart-line"></i> Monitoramento
                            </button>
                            <button onClick={() => setActiveTab('kyc')} className={`w-full sidebar-btn flex items-center gap-3 p-3 rounded-xl transition-all ${activeTab === 'kyc' ? 'active' : ''}`}>
                                <i className="fa-solid fa-user-shield"></i> Dossiê Kronoos
                            </button>
                        </nav>
                    </div>

                    {/* Main */}
                    <div className="flex-1 flex flex-col overflow-hidden bg-[#0b1120]">
                        <header className="p-5 border-b border-slate-800 flex justify-between items-center bg-[#0b1120]/80 backdrop-blur-sm">
                            <h2 className="text-lg font-bold text-white flex items-center gap-2">
                                <i className={`fa-solid ${activeTab === 'monitoramento' ? 'fa-wave-square' : 'fa-magnifying-glass-chart'} text-blue-500`}></i>
                                {activeTab === 'monitoramento' ? 'Monitoramento Transacional Meep' : 'Investigação de Vínculos Kronoos'}
                            </h2>
                            <div className="relative">
                                <i className="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                                <input type="text" placeholder="Buscar..." className="bg-slate-800/40 border border-slate-700 rounded-lg py-1.5 pl-9 pr-4 text-xs w-60 outline-none focus:border-blue-500"/>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8">
                            {activeTab === 'monitoramento' ? (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <div className="grid grid-cols-4 gap-6">
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-black uppercase mb-1 tracking-widest">TXs em Análise</div>
                                            <div className="flex items-center gap-2 text-white"><span className="text-2xl font-bold">142</span> <span className="text-[10px] text-red-400 font-bold">+12%</span></div>
                                        </div>
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-black uppercase mb-1 tracking-widest">Alertas Críticos</div>
                                            <div className="text-2xl font-bold text-red-500">08</div>
                                        </div>
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-black uppercase mb-1 tracking-widest">Total Bloqueado</div>
                                            <div className="text-2xl font-bold text-white">R$ 48.9k</div>
                                        </div>
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-black uppercase mb-1 tracking-widest">SLA de Resposta</div>
                                            <div className="text-2xl font-bold text-blue-400">18 min</div>
                                        </div>
                                    </div>

                                    <div className="bg-[#0f172a] rounded-xl border border-slate-800 overflow-hidden shadow-2xl">
                                        <div className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-800/20">
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-400">Transações Recentes sob Suspeita</h3>
                                        </div>
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-800/40 text-[10px] uppercase font-bold text-slate-500 border-b border-slate-800">
                                                <tr>
                                                    <th className="px-6 py-4">Lojista / Merchant</th>
                                                    <th className="px-6 py-4">Valor</th>
                                                    <th className="px-6 py-4 text-center">Score IA</th>
                                                    <th className="px-6 py-4">Padrão Detectado</th>
                                                    <th className="px-6 py-4">Status</th>
                                                    <th className="px-6 py-4 text-center">Ações</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800/50">
                                                {transactions.map(tx => (
                                                    <tr key={tx.id} className="hover:bg-blue-500/5 transition-colors">
                                                        <td className="px-6 py-4"><div className="font-bold text-white text-sm">{tx.merchant}</div><div className="text-[10px] text-slate-500 font-mono">{tx.id}</div></td>
                                                        <td className="px-6 py-4 text-sm font-bold text-white">R$ {tx.value.toLocaleString()}</td>
                                                        <td className="px-6 py-4"><div className="flex justify-center"><div className={`circular-score ${tx.risk > 80 ? 'border-red-500 text-red-500 bg-red-500/10' : 'border-emerald-500 text-emerald-500 bg-emerald-500/10'}`}>{tx.risk}</div></div></td>
                                                        <td className="px-6 py-4 text-[11px] italic text-slate-400">{tx.type}</td>
                                                        <td className="px-6 py-4"><span className={`text-[9px] font-black px-2 py-0.5 rounded ${tx.color}`}>{tx.status}</span></td>
                                                        <td className="px-6 py-4 text-center"><div className="flex justify-center gap-4 text-slate-500"><button onClick={()=>alert('TX Bloqueada')} className="hover:text-red-500"><i className="fa-solid fa-lock"></i></button><button onClick={()=>setActiveTab('kyc')} className="hover:text-blue-500"><i className="fa-solid fa-file-invoice"></i></button><button onClick={()=>alert('TX Liberada')} className="hover:text-emerald-500"><i className="fa-solid fa-unlock"></i></button></div></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-5xl mx-auto space-y-6">
                                    {!dossier ? (
                                        <div className="bg-[#0f172a] border-2 border-dashed border-slate-800 rounded-3xl p-20 text-center flex flex-col items-center">
                                            <i className={`fa-solid ${analyzing ? 'fa-spinner fa-spin' : 'fa-cloud-arrow-up'} text-4xl text-blue-500 mb-4`}></i>
                                            <h3 className="text-xl font-bold text-white">{analyzing ? 'Consultando Kronoos...' : 'Upload do Dossiê'}</h3>
                                            <input type="file" className="hidden" ref={fileInputRef} onChange={(e)=>{
                                                const reader = new FileReader();
                                                reader.onload = (ev) => analyzeDossier(ev.target.result);
                                                reader.readAsText(e.target.files[0]);
                                            }} />
                                            <button onClick={()=>fileInputRef.current.click()} className="mt-6 bg-blue-600 px-8 py-2 rounded-xl font-bold text-white text-xs uppercase tracking-widest">Selecionar .txt</button>
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 gap-8 items-start animate-in fade-in slide-in-from-bottom-4">
                                            <div className="bg-[#0f172a] p-8 rounded-3xl border border-slate-800 shadow-xl">
                                                <div className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Matriz de Decisão PLD</div>
                                                <div className="flex">
                                                    <div className="flex flex-col justify-between pr-4 pt-8 pb-2">{[5,4,3,2,1].map(p=><div key={p} className="text-[9px] font-bold text-slate-600">P{p}</div>)}</div>
                                                    <div className="flex-1 grid grid-cols-5 gap-2">
                                                        {[5,4,3,2,1].map(p => [1,2,3,4,5].map(i => {
                                                            const active = dossier.prob===p && dossier.imp===i;
                                                            return <div key={`${p}-${i}`} className={`matrix-cell ${active ? 'bg-red-500 shadow-[0_0_20px_red] scale-110' : 'bg-slate-800/40 opacity-20'}`}></div>
                                                        }))}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <div className="bg-blue-600 p-6 rounded-3xl shadow-xl flex justify-between items-center text-white">
                                                    <div><div className="text-[10px] font-black uppercase opacity-60">Sujeito da Investigação</div><div className="text-xl font-bold uppercase">{dossier.target}</div></div>
                                                    <button onClick={()=>setDossier(null)} className="bg-white/20 p-2 rounded-full"><i className="fa-solid fa-rotate-left"></i></button>
                                                </div>
                                                {dossier.checks.map((c,idx)=>(
                                                    <div key={idx} className="bg-[#0f172a] p-5 rounded-3xl border border-slate-800 border-l-4 border-l-blue-500">
                                                        <div className="flex justify-between items-center mb-2"><h5 className="font-bold text-white">{c.title}</h5><span className="text-[9px] font-black px-2 py-0.5 rounded bg-red-500/10 text-red-500">{c.status}</span></div>
                                                        <p className="text-xs text-slate-500 italic mb-4">"{c.desc}"</p>
                                                        <div className="bg-slate-900 p-3 rounded-xl border border-slate-800">
                                                            <div className="text-[9px] font-black text-blue-500 uppercase mb-1">Ação Meep</div>
                                                            <p className="text-xs font-bold text-white mb-2">{c.action}</p>
                                                            <div className="text-[8px] text-slate-600 font-bold border-t border-slate-800 pt-1.5 uppercase">Base: {c.legal}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
