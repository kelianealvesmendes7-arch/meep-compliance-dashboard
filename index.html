<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meep Compliance Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0b1120; margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
        .circular-score { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; border: 2px solid; }
        .matrix-cell { height: 45px; border-radius: 6px; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const LABELS_IMPACTO = ["Insignificante", "Menor", "Moderado", "Maior", "Catastrófico"];
        const LABELS_PROB = ["Muito Baixa", "Baixa", "Média", "Alta", "Muito Alta"];

        function App() {
            const [activeTab, setActiveTab] = useState('monitoramento');
            const [analyzing, setAnalyzing] = useState(false);
            const [dossier, setDossier] = useState(null);
            const fileInputRef = useRef(null);

            // --- DADOS MONITORAMENTO (ESTILO FOTO 1) ---
            const transactions = [
                { id: 'TX-8821', merchant: 'Restaurante Sabor Real', value: 45000, risk: 92, type: 'High Velocity / Fracionamento', status: 'EM ANÁLISE', statusColor: 'text-orange-400 bg-orange-400/10' },
                { id: 'TX-8822', merchant: 'Tech Store LTDA', value: 1250, risk: 12, type: 'Venda Padrão', status: 'APROVADO', statusColor: 'text-emerald-400 bg-emerald-400/10' },
                { id: 'TX-8823', merchant: 'M.J. Comércio Me', value: 150000, risk: 85, type: 'Fora de Perfil (Ticket Médio)', status: 'TRAVA PREVENTIVA', statusColor: 'text-red-400 bg-red-400/10' },
                { id: 'TX-8824', merchant: 'Posto Central', value: 300, risk: 5, type: 'Venda Padrão', status: 'APROVADO', statusColor: 'text-emerald-400 bg-emerald-400/10' },
                { id: 'TX-8825', merchant: 'Joalheria Brilho', value: 25000, risk: 78, type: 'Cartão não Presente / Suspeita de Fraude', status: 'BLOQUEADO', statusColor: 'text-red-500 bg-red-500/10' }
            ];

            // --- MOTOR DE INVESTIGAÇÃO (LÓGICA KRONOOS) ---
            const analyzeText = (text) => {
                const lower = text.toLowerCase();
                setAnalyzing(true);
                
                setTimeout(() => {
                    let prob = 1, imp = 1;
                    const vinculoKeywords = ['sócio', 'mãe', 'pai', 'irmão', 'cônjuge', 'filho', 'familiar'];
                    const foundVinculo = vinculoKeywords.find(k => lower.includes(k));
                    const isRelational = !!foundVinculo;
                    const target = isRelational ? foundVinculo.toUpperCase() : "TITULAR";

                    let checks = [];

                    if (lower.includes('pep') || lower.includes('político')) {
                        prob = 3; imp = 3;
                        checks.push({
                            title: "PEP (POLITICAMENTE EXPOSTA)",
                            status: "ALERTA",
                            desc: isRelational ? `O vínculo (${target}) é PEP. Risco de ocultação.` : "O titular é PEP direto.",
                            action: isRelational ? "Identificar Beneficiário Final. Coletar DPOP do lojista." : "Coletar DPOP. Aprovação obrigatória da Diretoria.",
                            basis: "Res. COAF 40/2021"
                        });
                    }

                    if (lower.includes('processo') || lower.includes('fraude') || lower.includes('crime')) {
                        prob = Math.max(prob, 5); imp = Math.max(imp, 4);
                        checks.push({
                            title: "RISCO JURÍDICO / PLD",
                            status: "CRÍTICO",
                            desc: `Detectado histórico criminal ligado a ${target}.`,
                            action: isRelational ? "Trava preventiva. Investigar se o titular é 'Laranja'." : "Descredenciar imediatamente e reportar ao COAF.",
                            basis: "Lei 9.613/1998"
                        });
                    }

                    if (checks.length === 0) {
                        checks.push({ title: "DILIGÊNCIA PADRÃO", status: "LIMPO", desc: "Nenhum apontamento grave.", action: "Aprovação automática.", basis: "Circ. BCB 3.978/20" });
                    }

                    setDossier({ name: "Resultado Dossiê Kronoos", prob, imp, score: prob * imp, target, checks });
                    setAnalyzing(false);
                }, 1500);
            };

            const getRiskColor = (risk) => {
                if (risk >= 15 || risk > 80) return 'border-red-500 text-red-500 bg-red-500/10';
                if (risk >= 10 || risk > 50) return 'border-orange-500 text-orange-500 bg-orange-500/10';
                return 'border-emerald-500 text-emerald-500 bg-emerald-500/10';
            };

            return (
                <div className="flex h-screen text-slate-200 overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-[#0f172a] border-r border-slate-800 flex flex-col shrink-0">
                        <div className="p-6 border-b border-slate-800 flex items-center gap-3">
                            <i className="fa-solid fa-shield-halved text-blue-500 text-2xl"></i>
                            <div className="leading-tight">
                                <div className="font-bold text-lg">RiskAnalytics</div>
                                <div className="text-blue-400 text-[10px] uppercase font-bold tracking-widest">Meep Compliance</div>
                            </div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <button onClick={() => setActiveTab('monitoramento')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${activeTab === 'monitoramento' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-bold' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <i className="fa-solid fa-chart-line"></i> Monitoramento
                            </button>
                            <button onClick={() => setActiveTab('kyc')} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${activeTab === 'kyc' ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 font-bold' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <i className="fa-solid fa-user-shield"></i> Dossiê Kronoos
                            </button>
                        </nav>
                    </div>

                    {/* Content */}
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <header className="p-5 border-b border-slate-800 bg-[#0b1120] flex justify-between items-center">
                            <h2 className="text-xl font-semibold flex items-center gap-2">
                                <i className={`fa-solid ${activeTab === 'monitoramento' ? 'fa-wave-square' : 'fa-magnifying-glass-chart'} text-blue-500`}></i>
                                {activeTab === 'monitoramento' ? 'Monitoramento Transacional Meep' : 'Investigação Especializada de Vínculos'}
                            </h2>
                            <div className="relative">
                                <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                                <input type="text" placeholder="Buscar Lojista..." className="bg-slate-800/50 border border-slate-700 rounded-lg py-2 pl-10 pr-4 text-xs w-64 focus:outline-none focus:border-blue-500"/>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 scroll-smooth">
                            {activeTab === 'monitoramento' ? (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    {/* KPIs */}
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-bold uppercase mb-2 tracking-widest">TXS em Análise (24h)</div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-2xl font-bold">142</span>
                                                <span className="text-[10px] text-red-400 font-bold bg-red-400/10 px-1.5 py-0.5 rounded">+12%</span>
                                            </div>
                                        </div>
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-bold uppercase mb-2 tracking-widest">Alertas Críticos</div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-2xl font-bold text-red-500">08</span>
                                                <span className="text-[10px] text-slate-500 font-bold">Pendente</span>
                                            </div>
                                        </div>
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-bold uppercase mb-2 tracking-widest">Total Bloqueado</div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-2xl font-bold tracking-tighter">R$ 48.9k</span>
                                                <span className="text-[10px] text-emerald-400 font-bold bg-emerald-400/10 px-1.5 py-0.5 rounded">-4%</span>
                                            </div>
                                        </div>
                                        <div className="bg-[#0f172a] p-5 rounded-xl border border-slate-800">
                                            <div className="text-slate-500 text-[10px] font-bold uppercase mb-2 tracking-widest">SLA de Resposta</div>
                                            <div className="flex items-center gap-2">
                                                <span className="text-2xl font-bold text-blue-400 font-mono">18 min</span>
                                                <span className="text-[10px] text-slate-500 font-bold
